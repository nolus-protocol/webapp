name: E2E T3 value-moving flows (manual)

on:
  workflow_dispatch:
    inputs:
      base_domain:
        description: "Target host the flows run against (e.g. app-dev.nolus.io)"
        required: true
        type: string

concurrency:
  group: e2e-t3-flows-${{ inputs.base_domain }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  t3-flows:
    name: T3 value-moving flows
    runs-on: [self-hosted, frontend-deploy]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Mask the resolver target in logs
        env:
          RESOLVER_TARGET: ${{ vars.DEPLOY_HOST }}
        run: |
          # Artifacts are scrubbed on disk before upload; tier stdout/stderr is not. Mask the
          # internal host in ALL subsequent step logs so a connect error can never print it.
          if [ -n "${RESOLVER_TARGET:-}" ]; then echo "::add-mask::${RESOLVER_TARGET}"; fi

      - name: Run the T3 value-moving flows
        id: t3flows
        working-directory: e2e
        env:
          E2E_BASE_URL: https://${{ inputs.base_domain }}
          E2E_WS_URL: wss://${{ inputs.base_domain }}/ws
          E2E_HOST_RESOLVER: ${{ inputs.base_domain }}=${{ vars.DEPLOY_HOST }}
          E2E_READONLY_ADDRESS: ${{ vars.E2E_READONLY_ADDRESS }}
          E2E_WALLET_MNEMONIC: ${{ secrets.E2E_WALLET_MNEMONIC }}
          E2E_WALLET_MNEMONIC_2: ${{ secrets.E2E_WALLET_MNEMONIC_2 }}
          E2E_SPEND_CAP_NLS: '100'
          E2E_SPEND_CAP_USDC: '50'
        run: |
          set -euo pipefail
          npm ci
          npx playwright install --with-deps chromium
          # t3 scripts pass --no-deps: this dispatch runs ONLY the t3 project, no t2 chain
          # and no live receive send. The primary wallet is kept funded out-of-band (the old
          # dependency-chain dust receive was incidental, never a real top-up); an
          # underfunded primary skips via the engine's funding guard rather than failing.
          npm run t3:flows

      - name: Scrub the resolver target from artifacts before upload
        if: always()
        working-directory: e2e
        env:
          RESOLVER_TARGET: ${{ vars.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          target="${RESOLVER_TARGET:-}"
          if [ -z "$target" ]; then
            echo "artifact scrub: no resolver target configured; nothing to redact"
            exit 0
          fi
          total=0
          for dir in results playwright-report test-results; do
            [ -d "$dir" ] || continue
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              n=$(grep -oaF -- "$target" "$f" | wc -l | tr -d ' ')
              total=$((total + n))
              perl -pi -e 'BEGIN{$t=$ENV{"RESOLVER_TARGET"}} s/\Q$t\E/<redacted-host>/g' "$f"
            done < <(grep -rIlF -- "$target" "$dir" 2>/dev/null || true)
          done
          # Second pass WITHOUT -I: any file still matching after text redaction is binary (a
          # trace.zip or screenshot the sanitizer can't rewrite) — delete it outright so the
          # resolver target never ships inside an opaque artifact.
          deleted=0
          for dir in results playwright-report test-results; do
            [ -d "$dir" ] || continue
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              echo "artifact scrub: deleting binary artifact containing the resolver target: $f"
              rm -f "$f"
              deleted=$((deleted + 1))
            done < <(grep -rlF -- "$target" "$dir" 2>/dev/null || true)
          done
          # Compressed pass: a trace.zip stores the resolver target COMPRESSED, so the raw-byte
          # grep above cannot see it. Inspect each zip's decompressed stream and delete on match.
          # If unzip is unavailable, fail closed — delete every zip in the artifact dirs (a public
          # repo must never ship a trace that might carry the internal host).
          zipped=0
          if command -v unzip >/dev/null 2>&1; then
            for dir in results playwright-report test-results; do
              [ -d "$dir" ] || continue
              while IFS= read -r z; do
                [ -n "$z" ] || continue
                if unzip -p "$z" 2>/dev/null | grep -qaF -- "$target"; then
                  echo "artifact scrub: deleting zip containing the resolver target: $z"
                  rm -f "$z"
                  zipped=$((zipped + 1))
                fi
              done < <(find "$dir" -type f -name '*.zip' 2>/dev/null || true)
            done
          else
            echo "artifact scrub: unzip unavailable — failing closed, deleting every zip in the artifact dirs"
            for dir in results playwright-report test-results; do
              [ -d "$dir" ] || continue
              while IFS= read -r z; do
                [ -n "$z" ] || continue
                echo "artifact scrub: deleting zip (no unzip to inspect): $z"
                rm -f "$z"
                zipped=$((zipped + 1))
              done < <(find "$dir" -type f -name '*.zip' 2>/dev/null || true)
            done
          fi
          echo "artifact scrub: redacted ${total} text occurrence(s); deleted ${deleted} binary file(s) and ${zipped} zip(s) across results/ playwright-report/ test-results/"

      - name: Upload T3 flow journal + report artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-t3-flows-${{ inputs.base_domain }}
          path: |
            e2e/results/
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
